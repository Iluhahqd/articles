{% load querystring %}
{% if page_obj.has_other_pages %}
    <nav class="mt-4">
        <ul class="pagination">
            {% if page_obj.has_previous %}
                <li class="page-item"><a class="page-link" href="?{% url_replace request 'page' page_obj.previous_page_number %}">Назад</a></li>
            {% endif %}
            {% for number in page_obj.paginator.page_range %}
                <li class="page-item {% if page_obj.number == number %}active{% endif %}">
                    <a class="page-link" href="?{% url_replace request 'page' number %}">{{ number }}</a>
                </li>
            {% endfor %}
            {% if page_obj.has_next %}
                <li class="page-item"><a class="page-link" href="?{% url_replace request 'page' page_obj.next_page_number %}">Вперед</a></li>
            {% endif %}
        </ul>
    </nav>
{% endif %}
