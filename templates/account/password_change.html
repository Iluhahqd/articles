{% extends 'base.html' %}

{% block title %}Смена пароля | ArticleHub{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <h1 class="h3 mb-3">Смена пароля</h1>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-dark" type="submit">Обновить пароль</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
