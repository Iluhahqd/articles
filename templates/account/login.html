{% extends 'base.html' %}

{% block title %}Вход | ArticleHub{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <h1 class="h3 mb-3">Вход в систему</h1>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-dark w-100" type="submit">Войти</button>
                </form>
                <div class="d-flex justify-content-between mt-3">
                    <a href="{% url 'users:password_reset' %}">Забыли пароль?</a>
                    <a href="{% url 'users:register' %}">Создать аккаунт</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
