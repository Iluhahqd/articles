{% extends 'base.html' %}

{% block title %}Редактирование профиля | ArticleHub{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <h1 class="h3 mb-3">Редактирование профиля</h1>
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-dark" type="submit">Сохранить изменения</button>
                    <a class="btn btn-outline-secondary" href="{% url 'users:profile' %}">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
