{% extends 'base.html' %}

{% block title %}Удаление статьи | ArticleHub{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <h1 class="h3 mb-3">Удалить статью?</h1>
                <p class="text-muted">Вы собираетесь удалить статью «{{ object.title }}». Это действие нельзя отменить.</p>
                <form method="post">
                    {% csrf_token %}
                    <button class="btn btn-danger" type="submit">Удалить</button>
                    <a class="btn btn-outline-secondary" href="{{ object.get_absolute_url }}">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
