{% extends 'base.html' %}

{% block title %}Удаление комментария | ArticleHub{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <h1 class="h3 mb-3">Удалить комментарий?</h1>
                <p class="text-muted">{{ object.text|truncatechars:120 }}</p>
                <form method="post">
                    {% csrf_token %}
                    <button class="btn btn-danger" type="submit">Удалить</button>
                    <a class="btn btn-outline-secondary" href="{{ object.article.get_absolute_url }}">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
